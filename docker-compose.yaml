services:
  docling-converter:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./dataset:/app/dataset
      - ./scratch:/app/scratch
      - docling_cache:/root/.cache

    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    
    command: ["python", "document_converter.py", "/app/dataset", "--output_dir", "/app/scratch"]

  langchain-chunker:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./scratch:/app/scratch
      - docling_cache:/root/.cache
    
    command: ["python", "create_chunks.py", "/app/scratch", "--output_json", "/app/langchain_chunks.json"]
  
  vector-store:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./scratch:/app/scratch
      - ./vector-db:/app/vector-db
      - docling_cache:/root/.cache
    
    command: ["python", "vector_store.py", "/app/scratch", "--persist_directory", "/app/vector-db", "--initial_k", "20", "--final_k", "5"]

  agent:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
    volumes:
      - ./scratch:/app/scratch
      - ./vector-db:/app/vector-db
      - ./json:/app/json
      - docling_cache:/root/.cache
    
    command: ["python", "agent.py", "--persist_directory", "/app/vector-db", "--output_dir", "/app/json"]

volumes:
  docling_cache: